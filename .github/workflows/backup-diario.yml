name: Backup Diário — LIV Energia

on:
  schedule:
    # Roda todo dia às 03:00 (horário UTC = 00:00 Brasília)
    - cron: "0 3 * * *"
  workflow_dispatch:
    # Permite acionar manualmente pelo GitHub

jobs:
  backup:
    name: Gerar e salvar backup
    runs-on: ubuntu-latest

    steps:
      - name: Chamar endpoint de backup
        id: fetch
        run: |
          DATE=$(date +%Y-%m-%d)
          FILENAME="backup-livenergia-${DATE}.json"

          echo "Baixando backup de $DATE..."

          HTTP_STATUS=$(curl -s -o backup.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.BACKUP_SECRET }}" \
            "${{ secrets.RAILWAY_URL }}/api/admin/backup")

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERRO: endpoint retornou status $HTTP_STATUS"
            cat backup.json
            exit 1
          fi

          # Verificar que o arquivo tem conteúdo válido
          TOTAL=$(cat backup.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['totais']['posVenda'])" 2>/dev/null || echo "?")
          echo "Backup gerado com sucesso. PosVenda: $TOTAL registros."
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT

      - name: Salvar backup como artefato (30 dias)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.fetch.outputs.filename }}
          path: backup.json
          retention-days: 30

      - name: Commitar backup no branch 'backups'
        run: |
          DATE=$(date +%Y-%m-%d)
          FILENAME="backup-livenergia-${DATE}.json"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Mudar para o branch backups (cria se não existir)
          git fetch origin backups 2>/dev/null || true
          git checkout -B backups origin/backups 2>/dev/null || git checkout --orphan backups

          # Manter apenas os últimos 30 arquivos para não engordar o repo
          mkdir -p backups
          cp backup.json "backups/${FILENAME}"
          ls -t backups/*.json 2>/dev/null | tail -n +31 | xargs rm -f 2>/dev/null || true

          git add backups/
          git diff --cached --quiet || git commit -m "backup: ${DATE}"
          git push origin backups
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
